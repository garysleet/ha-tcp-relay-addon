name: "TCP Relay"
version: "1.1.0"
slug: "tcp_relay"
description: "Minimal host-network HTTP-aware logging relay with a configurable, HA-controllable backend target"
url: "https://github.com/garysleet/ha-tcp-relay-addon"
arch:
  - aarch64
  - amd64
init: false
host_network: true
startup: services
boot: auto
options:
  listen_port: 8001
  target_host: "deepspace.anthropics.com"
  target_port: 8001
schema:
  listen_port: "port"
  target_host: "str"
  target_port: "port"
